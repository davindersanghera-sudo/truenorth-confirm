<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Confirmed — True North Compliance</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0b0f14;--surface:#131920;--border:#1e2a35;--accent:#f0a500;--pass:#2ea043;--text:#e6edf3;--muted:#7d8fa0;--font-d:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;max-width:520px;width:100%;text-align:center;}
  .icon{width:72px;height:72px;border-radius:50%;background:rgba(240,165,0,0.15);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px;}
  h1{font-family:var(--font-d);font-size:32px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  p{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:16px;}
  .debug{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;padding:12px;margin:16px 0;font-size:12px;color:var(--muted);text-align:left;font-family:monospace;word-break:break-all;max-height:200px;overflow-y:auto;}
  .credits-badge{background:rgba(46,160,67,0.12);border:1px solid rgba(46,160,67,0.3);border-radius:8px;padding:16px 24px;margin:20px 0;font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--pass);}
  .btn{display:inline-block;padding:14px 28px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font-d);font-size:17px;font-weight:800;letter-spacing:1px;text-transform:uppercase;text-decoration:none;background:var(--accent);color:#0b0f14;transition:all 0.2s;margin-top:8px;}
  .btn:hover{background:#ffb730;}
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⌛</div>
  <h1 id="title">Confirming Payment</h1>
  <p id="message">Please wait...</p>
  <div class="debug" id="debug">Starting...</div>
  <div id="badge" style="display:none"></div>
  <div id="actions" style="display:none"></div>
</div>
<script>
const API='https://jhovfsatnvdyifmwljhf.supabase.co/functions/v1/si-analysis';
const dbg=document.getElementById('debug');
const log=(m)=>{dbg.innerHTML+='<br>'+m;console.log(m);};

async function run(){
  const p=new URLSearchParams(location.search);
  const sessionId=p.get('session_id');
  const email=p.get('email');
  log('session_id: '+(sessionId?sessionId.substring(0,25)+'...':'MISSING'));
  log('email: '+(email||'MISSING'));
  if(!sessionId||!email)return showError('Missing session_id or email in URL.');
  log('Calling: '+API+'/confirm-payment');
  let res,raw,data;
  try{
    res=await fetch(API+'/confirm-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId,email})});
    log('HTTP status: '+res.status);
  }catch(e){log('FETCH FAILED: '+e.message);return showError('Network error: '+e.message);}
  try{raw=await res.text();log('Response: '+raw.substring(0,300));}
  catch(e){return showError('Could not read response.');}
  try{data=JSON.parse(raw);}
  catch(e){return showError('Bad response from API: '+raw.substring(0,150));}
  if(!data.ok){log('API error: '+data.error);return showError(data.error||'Unknown error');}
  log('SUCCESS - credits: '+data.credits);
  document.getElementById('icon').textContent='✓';
  document.getElementById('icon').style.cssText='width:72px;height:72px;border-radius:50%;background:rgba(46,160,67,0.2);border:2px solid #2ea043;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px;';
  document.getElementById('title').innerHTML='Payment <span style="color:#2ea043">Confirmed!</span>';
  document.getElementById('message').textContent='Credits added to '+email+'. Go to TM Tools to use them.';
  document.getElementById('debug').style.display='none';
  document.getElementById('badge').style.display='block';
  document.getElementById('badge').innerHTML='<div class="credits-badge">'+data.credits+' report credit'+(data.credits!==1?'s':'')+' added</div>';
  document.getElementById('actions').style.display='block';
  document.getElementById('actions').innerHTML='<a href="https://www.truenorth-compliance.co.uk/tm-tools" class="btn">Go to TM Tools</a>';
}

function showError(msg){
  document.getElementById('icon').textContent='✕';
  document.getElementById('icon').style.cssText='width:72px;height:72px;border-radius:50%;background:rgba(218,54,51,0.15);border:2px solid #da3633;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px;';
  document.getElementById('title').innerHTML='Something <span style="color:#da3633">Went Wrong</span>';
  document.getElementById('message').textContent=msg;
  document.getElementById('actions').style.display='block';
  document.getElementById('actions').innerHTML='<a href="https://www.truenorth-compliance.co.uk/tm-tools" class="btn" style="background:transparent;border:1px solid #1e2a35;color:#7d8fa0;">Back to TM Tools</a>';
}

run();
</script>
</body>
</html>
